<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Completing sign in...</title>
    <style>
      body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f5f5f5; color: #333; }
      .spinner { width: 24px; height: 24px; border: 3px solid #e0e0e0; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 12px; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .container { display: flex; align-items: center; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="spinner"></div>
      <span>Completing sign in...</span>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
